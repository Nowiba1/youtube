<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Downloader</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; color: #333; margin-bottom: 30px; }
        .input-section { display: flex; gap: 10px; margin-bottom: 30px; }
        #urlInput {
            flex: 1;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }
        .btn {
            padding: 15px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn:hover { background: #5a67d8; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        #videoInfo {
            margin-bottom: 30px;
            padding: 20px;
            background: #f7fafc;
            border-radius: 10px;
        }
        #thumbnail {
            width: 100%;
            max-width: 320px;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .format-selection { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #4a5568; font-weight: 600; }
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 15px;
        }
        #status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .status-info { background: #bee3f8; color: #2b6cb0; }
        .status-success { background: #c6f6d5; color: #22543d; }
        .status-error { background: #fed7d7; color: #9b2c2c; }
        .hidden { display: none; }
        .progress-bar {
            width: 100%;
            height: 20px;
            background: #e2e8f0;
            border-radius: 10px;
            margin-top: 10px;
        }
        .progress-fill {
            height: 100%;
            background: #667eea;
            width: 0%;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎥 YouTube Downloader</h1>
        
        <div class="input-section">
            <input type="text" id="urlInput" placeholder="Paste YouTube URL here..." />
            <button class="btn" id="fetchBtn" onclick="fetchFormats()">Fetch</button>
        </div>

        <div id="videoInfo" class="hidden">
            <img id="thumbnail" src="" alt="Video thumbnail">
            <h2 id="title"></h2>
        </div>

        <div id="downloadSection" class="hidden">
            <div class="format-selection">
                <label>Download Type:</label>
                <select id="downloadType" onchange="updateQualityOptions()">
                    <option value="video">Video (MP4)</option>
                    <option value="audio">Audio (MP3)</option>
                </select>
            </div>

            <div class="format-selection">
                <label>Quality:</label>
                <select id="qualitySelect"></select>
            </div>

            <button class="btn" id="downloadBtn" onclick="startDownload()">Download</button>
        </div>

        <div id="status">
            <div id="statusMessage"></div>
            <div class="progress-bar hidden" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
    </div>

    <script>
        // Free public yt-dlp API
        const API_BASE = 'https://ytdl-api.vercel.app/api';
        
        let currentFormats = [];
        let videoInfo = null;

        function showStatus(message, type = 'info') {
            const statusDiv = document.getElementById('status');
            const messageDiv = document.getElementById('statusMessage');
            statusDiv.style.display = 'block';
            statusDiv.className = `status-${type}`;
            messageDiv.textContent = message;
        }

        function extractVideoId(url) {
            const match = url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/);
            return match ? match[1] : null;
        }

        async function fetchFormats() {
            const url = document.getElementById('urlInput').value.trim();
            
            if (!url) {
                showStatus('Please enter a YouTube URL', 'error');
                return;
            }
            
            const videoId = extractVideoId(url);
            if (!videoId) {
                showStatus('Invalid YouTube URL', 'error');
                return;
            }
            
            showStatus('Fetching video information...', 'info');
            document.getElementById('fetchBtn').disabled = true;
            
            try {
                // Get video info
                const infoResponse = await fetch(`${API_BASE}/info?id=${videoId}`);
                const infoData = await infoResponse.json();
                
                if (infoData.error) {
                    throw new Error(infoData.error);
                }
                
                videoInfo = infoData;
                
                // Get available formats
                const formatsResponse = await fetch(`${API_BASE}/formats?id=${videoId}`);
                const formatsData = await formatsResponse.json();
                
                if (formatsData.error) {
                    throw new Error(formatsData.error);
                }
                
                currentFormats = formatsData.formats || [];
                
                document.getElementById('videoInfo').classList.remove('hidden');
                document.getElementById('thumbnail').src = infoData.thumbnail || `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;
                document.getElementById('title').textContent = infoData.title || 'YouTube Video';
                
                updateQualityOptions();
                
                document.getElementById('downloadSection').classList.remove('hidden');
                showStatus('Ready to download!', 'success');
                
            } catch (error) {
                showStatus(error.message, 'error');
            } finally {
                document.getElementById('fetchBtn').disabled = false;
            }
        }

        function updateQualityOptions() {
            const type = document.getElementById('downloadType').value;
            const select = document.getElementById('qualitySelect');
            select.innerHTML = '';
            
            if (type === 'video') {
                const qualities = ['2160p', '1440p', '1080p', '720p', '480p', '360p'];
                qualities.forEach(q => {
                    const option = document.createElement('option');
                    option.value = q;
                    option.textContent = q;
                    select.appendChild(option);
                });
            } else {
                ['320kbps', '256kbps', '192kbps', '128kbps'].forEach(q => {
                    const option = document.createElement('option');
                    option.value = q;
                    option.textContent = `MP3 - ${q}`;
                    select.appendChild(option);
                });
            }
        }

        async function startDownload() {
            const url = document.getElementById('urlInput').value.trim();
            const type = document.getElementById('downloadType').value;
            const quality = document.getElementById('qualitySelect').value;
            
            const videoId = extractVideoId(url);
            if (!videoId) {
                showStatus('Invalid YouTube URL', 'error');
                return;
            }
            
            showStatus('Preparing download...', 'info');
            document.getElementById('downloadBtn').disabled = true;
            document.getElementById('progressBar').classList.remove('hidden');
            document.getElementById('progressFill').style.width = '30%';
            
            try {
                const downloadUrl = `${API_BASE}/download?id=${videoId}&type=${type}&quality=${quality}`;
                
                document.getElementById('progressFill').style.width = '60%';
                
                // Fetch the file
                const response = await fetch(downloadUrl);
                
                if (!response.ok) {
                    throw new Error('Download failed');
                }
                
                document.getElementById('progressFill').style.width = '90%';
                
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = `${videoInfo?.title || 'video'}.${type === 'audio' ? 'mp3' : 'mp4'}`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(blobUrl);
                
                document.getElementById('progressFill').style.width = '100%';
                showStatus('Download complete!', 'success');
                
                setTimeout(() => {
                    document.getElementById('progressBar').classList.add('hidden');
                }, 2000);
                
            } catch (error) {
                showStatus(error.message, 'error');
                document.getElementById('progressBar').classList.add('hidden');
            } finally {
                document.getElementById('downloadBtn').disabled = false;
            }
        }
    </script>
</body>
</html>
